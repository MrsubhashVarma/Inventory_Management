<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Food Delivery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">SwiggyPro</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
        </ul>
    </nav>
    <div class="hero">
        <div class="card form-container">
            <h2 class="mb-1 text-center">Register</h2>
            <form id="registerForm">
                <div class="form-group">
                    <input type="text" id="reg-name" placeholder="Full Name" class="form-control" required>
                </div>
                <div class="form-group">
                    <input type="email" id="reg-email" placeholder="Email" class="form-control" required>
                </div>
                <div class="form-group">
                    <input type="text" id="reg-phone" placeholder="Phone" class="form-control" required>
                </div>
                <div class="form-group">
                    <input type="text" id="reg-address" placeholder="Address" class="form-control" required>
                </div>
                <div class="form-group">
                    <input type="text" id="reg-city" placeholder="City" class="form-control" required>
                </div>
                <button type="submit" class="btn-primary w-100">Register</button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                full_name: document.getElementById('reg-name').value,
                email: document.getElementById('reg-email').value,
                phone: document.getElementById('reg-phone').value,
                address: document.getElementById('reg-address').value,
                city: document.getElementById('reg-city').value
            };
            const res = await fetch('http://127.0.0.1:8000/customers/add/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (res.ok) {
                alert('Registered successfully!');
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
