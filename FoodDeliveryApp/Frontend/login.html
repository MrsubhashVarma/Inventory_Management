<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Food Delivery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">SwiggyPro</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
        </ul>
    </nav>
    <div class="hero">
        <div class="card form-container">
            <h2 class="mb-1 text-center">Login</h2>
            <form onsubmit="event.preventDefault(); alert('Logged in!');">
                <div class="form-group">
                    <input type="email" placeholder="Email" class="form-control" required>
                </div>
                <div class="form-group">
                    <input type="password" placeholder="Password" class="form-control" required>
                </div>
                <button type="submit" class="btn-primary w-100">Login</button>
            </form>
            <p class="mt-1 text-center">Don't have an account? <a href="register.html" class="text-primary">Register</a></p>
        </div>
    </div>
</body>
</html>
